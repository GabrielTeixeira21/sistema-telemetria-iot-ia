spring.application.name=sistema-telemetria

# Ligação à base de dados Postgres local
spring.datasource.url=jdbc:postgresql://localhost:5432/iot_telemetria_db
spring.datasource.username=postgres
spring.datasource.password=admin

# Instrução para o Hibernate criar/atualizar as tabelas automaticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect